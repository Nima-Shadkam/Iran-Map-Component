    //#region Click on Province And Zoom
    var modelData = {};
    simplemaps_countrymap.hooks.zoomable_click_state = function (id) {

        let provincesList = [];
        for (let index = 0; index < 31; index++) {
            const el = simplemaps_countrymap_mapdata.labels[index];
            provincesList.push(el);
        }
        let provinceDataClicked = provincesList.find(f => f.parent_id == id);
        // const cityInfo = document.querySelector('#city-info');
        // cityInfo.textContent = provinceDataClicked.name;
        // modelData = { ...provinceDataClicked };

        document.querySelector('#modal-info').style.display = "block"
        modelData.title = provinceDataClicked.name;
        modelData.parent_id = provinceDataClicked.parent_id;
        modelData.value = provinceDataClicked.val;
        modelData.latitute = provinceDataClicked.x;
        modelData.longitude = provinceDataClicked.y;
        // document.getElementById('city-info').textContent =` اطلاعات جغرافیایی استان: ${modelData.title}`;
        document.getElementById('city-info').textContent = ` اطلاعات جغرافیایی استان:` + modelData.title;
        const cityList = document.getElementById('city-items');

        if (!cityList) return;

        const fragment = document.createDocumentFragment();

        // ۴. تعریف آیتم‌ها با ترتیب درست و شماره‌گذاری
        const items = [
            { label: 'شناسه والد', value: modelData.parent_id },
            { label: 'مقدار', value: modelData.value },
            { label: 'عرض جغرافیایی', value: modelData.latitute },
            { label: 'طول جغرافیایی', value: modelData.longitude }
        ];

        // ۵. ساخت المنت‌ها و اضافه کردن به فرگمنت
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.style.listStyle = "none"; // حذف دایره پیش‌فرض لیست در صورت نیاز
            li.style.padding = "5px 0";

            // نمایش به صورت: ۱. نام فیلد: مقدار
            li.innerHTML = `<span style="color: #666;">${index + 1}.</span> <strong>${item.label}:</strong> ${item.value}`;

            fragment.appendChild(li);
        });

        // ۶. اعمال نهایی به DOM
        cityList.appendChild(fragment);
    }
