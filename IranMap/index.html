<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iran Map</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.weather.css">

    <script src="js/bootstrap.min.js" defer></script>
</head>

<body>

    <div id="map">

    </div>

    <div class="modal" id="modal-info" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <p> <span id="city-info"></span></p>
                    </h5>
                    <button onclick="hideModal()" type="button" class="btn-close btn btn-danger">×</button>
                </div>
                <div class="modal-body">
                    <ol id="city-items"></ol>
                </div>

                <!-- کارت نمایش آب و هوا -->
                <div id="weatherCard" class="weather-card hide">
                    <h2 id="cityName">تهران</h2>

                    <div class="weather-main">
                        <img id="weatherIcon" src="" alt="وضعیت آب و هوا">
                        <div id="temperature">28°C</div>
                        <div id="weatherDesc">صاف</div>
                    </div>

                    <!-- جزئیات اضافی با چیدمان گرید -->
                    <div class="details">
                        <div class="item">
                            <span>رطوبت</span>
                            <strong id="humidity">69%</strong>
                        </div>
                        <div class="item">
                            <span>سرعت باد</span>
                            <strong id="windSpeed">1.79 km/h</strong>
                        </div>
                        <div class="item">
                            <span>فشار هوا</span>
                            <strong id="pressure">1019 hPa</strong>
                        </div>
                    </div>

                    <!-- بخش پیش‌بینی ۵ روز آینده -->
                    <h3 class="forecast-title">پیش‌بینی ۵ روز آینده</h3>
                    <div class="forecast" id="forecastContainer">
                        <!-- این بخش توسط جاوااسکریپت پر می‌شود -->
                    </div>
                </div>

                <div class="modal-footer">
                    <button onclick="hideModal()" type="button" class="btn btn-secondary">بستن</button>
                </div>
            </div>
        </div>
    </div>





</body>

</html>
<script src="js/mapdata.js"></script>
<script src="js/citites.js"></script>

<script src="js/countrymap.js"></script>
<script src="js/jquery-3.3.1.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script>




    $(function () {
        // reloadMap();
        hideLogoSimplemaps();
        getLocationForProvince();
        //  changeColorProvince();
        //  changeColorForLocation();
    })

    const hideLogoSimplemaps = () => {
        setTimeout(() => {
            $('tspan:contains("Simplemaps.com Trial")').hide();
        }, 10);
    }

    const hideModal = () => {
        document.querySelector('#modal-info').style.display = "none";
        document.getElementById('city-items').innerHTML = "";


    }

    //#region Reload Map
    const reloadMap = () => {
        simplemaps_countrymap.load();
    }
    //#endregion


    //#region ZoomOut
    const zoomOut = () => {
        simplemaps_countrymap.hooks.back = function () {
            /// Your Code
        }
    }
    //#endregion

    //#region  Set Location For Province
    const getLocationForProvince = () => {
        jQuery.each(dataLocation, function (index, value) {
            simplemaps_countrymap_mapdata.locations[index] = {
                name: value.city, lat: "",
                lng: ""
            };
        })

        jQuery.each(dataLocation, function (index, value) {
            simplemaps_countrymap_mapdata.locations[index] = {
                name: value.city,
                lat: value.latitude.toString(),
                lng: value.longitude.toString(),
                description: "",
                image_url: "images/vector-clipart.png"
            };
        })
        reloadMap();

    }
    //#endregion

    //#region  Change Color Province

    const changeColorProvince = () => {
        var simplemaps = ["IRN3209", "IRN3210", "IRN3211", "IRN3212", "IRN3213", "IRN3214", "IRN3215",
            "IRN3216", "IRN3217", "IRN3218", "IRN3219", "IRN3220",
            "IRN3221", "IRN3228", "IRN3230", "IRN3231",
            "IRN3232", "IRN3233", "IRN3234", "IRN3235",
            "IRN3237", "IRN3238", "IRN3239", "IRN3240", "IRN3241",
            "IRN3244", "IRN3245", "IRN3246", "IRN3247", "IRN3248", "IRN5490"];

        for (var y = 0; y < simplemaps.length; y++) {
            if (y % 2) {
                simplemaps_countrymap.mapdata.state_specific[simplemaps[y]].color = "green";
            }
            else {
                simplemaps_countrymap.mapdata.state_specific[simplemaps[y]].color = "orange";
            }
        }

    }
    const resetColorProvince = () => {
        var simplemaps = ["IRN3209", "IRN3210", "IRN3211", "IRN3212", "IRN3213", "IRN3214", "IRN3215",
            "IRN3216", "IRN3217", "IRN3218", "IRN3219", "IRN3220",
            "IRN3221", "IRN3228", "IRN3230", "IRN3231",
            "IRN3232", "IRN3233", "IRN3234", "IRN3235",
            "IRN3237", "IRN3238", "IRN3239", "IRN3240", "IRN3241",
            "IRN3244", "IRN3245", "IRN3246", "IRN3247", "IRN3248", "IRN5490"];

        for (var y = 0; y < simplemaps.length; y++) {
            simplemaps_countrymap.mapdata.state_specific[simplemaps[y]].color = "default";
        }
    }

    //#endregion

    //#region  Change Color Location (City)

    const changeColorForLocation = () => {
        jQuery.each(dataLocation, function (index, value) {
            simplemaps_countrymap_mapdata.locations[index] = {
                name: value.city, lat: "",
                lng: ""
            };
        })

        jQuery.each(dataLocation, function (index, value) {
            if (index % 2) {
                simplemaps_countrymap_mapdata.locations[index] = {
                    name: value.city,
                    lat: value.latitude.toString(),
                    lng: value.longitude.toString(),
                    description: "",
                    image_url: "images/pin-map-icon-black.png"
                }
            }
            else {
                simplemaps_countrymap_mapdata.locations[index] = {
                    name: value.city,
                    lat: value.latitude.toString(),
                    lng: value.longitude.toString(),
                    description: "",
                    image_url: "images/green-map-location.png"
                }
            }

        })
        reloadMap();

    }

    //#endregion

    //#region Click on Province And Zoom
    var modelData = {};
    simplemaps_countrymap.hooks.zoomable_click_state = function (id) {

        let provincesList = [];
        for (let index = 0; index < 31; index++) {
            const el = simplemaps_countrymap_mapdata.labels[index];
            provincesList.push(el);
        }
        let provinceDataClicked = provincesList.find(f => f.parent_id == id);
        // const cityInfo = document.querySelector('#city-info');
        // cityInfo.textContent = provinceDataClicked.name;
        // modelData = { ...provinceDataClicked };

        document.querySelector('#modal-info').style.display = "block"
        modelData.title = provinceDataClicked.name;
        modelData.parent_id = provinceDataClicked.parent_id;
        modelData.value = provinceDataClicked.val;
        modelData.latitute = provinceDataClicked.x;
        modelData.longitude = provinceDataClicked.y;
        // document.getElementById('city-info').textContent =` اطلاعات جغرافیایی استان: ${modelData.title}`;
        document.getElementById('city-info').textContent = ` استان : ` + modelData.title;


        const cityList = document.getElementById('city-items');

        if (!cityList) return;

        const fragment = document.createDocumentFragment();

        // ۴. تعریف آیتم‌ها با ترتیب درست و شماره‌گذاری
        const items = [
            { label: 'شناسه والد', value: modelData.parent_id },
            // { label: 'مقدار', value: modelData.value },
            { label: 'عرض جغرافیایی', value: modelData.latitute },
            { label: 'طول جغرافیایی', value: modelData.longitude }
        ];

        // ۵. ساخت المنت‌ها و اضافه کردن به فرگمنت
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.style.listStyle = "none"; // حذف دایره پیش‌فرض لیست در صورت نیاز
            li.style.padding = "5px 0";

            // نمایش به صورت: ۱. نام فیلد: مقدار
            li.innerHTML = `<span style="color: #666;">${index + 1}.</span> <strong>${item.label}:</strong> ${item.value}`;

            fragment.appendChild(li);
        });
        weatherCard.classList.add('hide');

        // ۶. اعمال نهایی به DOM
         cityList.appendChild(fragment);

        // getWeather(modelData.title);
    }
    //#endregion

    //#region Click on Location (City)

    simplemaps_countrymap.hooks.click_location = function (id) {

        let clickedLocation = dataLocation[id];
        
        document.querySelector('#modal-info').style.display = "block"
        document.getElementById('city-info').textContent = `  شهر : ` + clickedLocation.city;
        getWeather(clickedLocation.city);

    }
    //#endregion

    //#region Add Weather Information
    const apiKey = 'd28e1137741b471abebb3a30d839d611';

    // عناصر DOM برای آب و هوا
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const weatherCard = document.getElementById('weatherCard');
    const errorMessage = document.getElementById('errorMessage');

    const cityName = document.getElementById('cityName');
    const weatherIcon = document.getElementById('weatherIcon');
    const temperature = document.getElementById('temperature');
    const weatherDesc = document.getElementById('weatherDesc');
    const humidity = document.getElementById('humidity');
    const windSpeed = document.getElementById('windSpeed');
    const pressure = document.getElementById('pressure');
    const forecastContainer = document.getElementById('forecastContainer');


    // ۲. فراخوانی داده‌های آب و هوایی
    async function getWeather(city) {
        
        if (!city) return;

        try {
            // پنهان کردن خطاها و کارت قبل از بارگذاری مجدد
            // errorMessage.classList.add('hide');
            // weatherCard.classList.add('hide');

            const encodedCity = encodeURIComponent(city);
            const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodedCity}&appid=${apiKey}&units=metric&lang=fa`;

            const response = await fetch(url);
            if (!response.ok) {
                throw new Error('City not found');
            }

            const data = await response.json();
            updateUI(data);
        } catch (error) {
            showError('شهر مورد نظر پیدا نشد یا خطایی رخ داده است.');
        }
    }

    // ۳. به‌روزرسانی رابط کاربری (UI)
    function updateUI(data) {
        const current = data.list[0];

        // مقادیر اصلی
        cityName.textContent = data.city.name;
        temperature.textContent = `${Math.round(current.main.temp)}°C`;
        weatherDesc.textContent = current.weather[0].description;

        // جزئیات کارت
        humidity.textContent = `${current.main.humidity}%`;
        windSpeed.textContent = `${current.wind.speed} m/s`;
        pressure.textContent = `${current.main.pressure} hPa`;

        // آیکون اصلی
        const iconCode = current.weather[0].icon;
        weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

        // ساخت پیش‌بینی ۵ روزه
        forecastContainer.innerHTML = '';

        // فیلتر کردن اطلاعات برای گرفتن یک داده از هر روز (معمولا ساعت ۱۲:۰۰ ظهر)
        const dailyData = data.list.filter(item => item.dt_txt.includes('12:00:00')).slice(0, 5);

        dailyData.forEach(day => {
            const date = new Date(day.dt * 1000);
            const dayName = date.toLocaleDateString('fa-IR', { weekday: 'long' });
            const temp = `${Math.round(day.main.temp)}°C`;
            const icon = day.weather[0].icon;

            const dayElement = document.createElement('div');
            dayElement.className = 'day';
            dayElement.innerHTML = `
            <p class="day-name">${dayName}</p>
            <img src="https://openweathermap.org/img/wn/${icon}.png" alt="weather">
            <p class="temp">${temp}</p>
        `;
            forecastContainer.appendChild(dayElement);
        });

        // نمایش کارت با انیمیشن ملایم
        weatherCard.classList.remove('hide');
    }



    //#endregion





</script>
